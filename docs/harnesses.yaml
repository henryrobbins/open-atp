# Single source of truth for the harness comparison tables in README.md and
# docs/harnesses/index.md. Edit here, then run `make gen-provers` (regenerates the
# README table in place; the docs fragment is written at build time by the
# `provers_table` Sphinx extension). `make check-provers` fails if README drifts.
#
# A harness is the coding-agent CLI an agent prover runs on. Each prover's `harness`
# field (docs/provers.yaml) keys into the `harnesses` list below by `id`. Skills and
# MCP stay on the prover row: the skills list is a prover-level knob and MCP wiring,
# while fixed per harness, is described alongside it there.
#
# Cell conventions: any field left null renders as an em dash (—). `page` is the
# harness's doc page under docs/harnesses/ (null when it has none yet, in which case
# its harness detail still lives on the prover page).

harnesses:
  - name: Claude Code
    page: null
    id:   claude_code
    company: { label: Anthropic, url: https://www.anthropic.com }
    source: null            # the coding agent itself; not open source

  - name: Codex
    page: null
    id:   codex
    company: { label: OpenAI, url: https://openai.com }
    source: { label: GitHub, url: https://github.com/openai/codex }

  - name: OpenCode
    page: opencode
    id:   opencode
    company: { label: SST, url: https://sst.dev }
    source: { label: GitHub, url: https://github.com/sst/opencode }

  - name: Vibe
    page: null
    id:   vibe
    company: { label: Mistral AI, url: https://mistral.ai }
    source: { label: Docs, url: https://docs.mistral.ai/vibe }

  - name: ax-prover
    page: null
    id:   axproverbase
    company: { label: Axiomatic AI, url: https://axiomatic-ai.com }
    source: { label: GitHub, url: https://github.com/Axiomatic-AI/ax-prover-base }
