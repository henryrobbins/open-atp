# Lean scaffold with an explicitly-pinned Leanstral model. Vibe's builtin `lean`
# agent pins its own (deprecated) Leanstral and exposes no `--model` flag, so this
# profile mirrors that agent -- same Lean system prompt and bash-driven Lean
# workflow (`system_prompt_id = "lean"`) -- while letting the harness choose the
# model. The VibeHarness templates it in: it substitutes `<<MODEL>>` (the config
# `model`, default `labs-leanstral-1-5`, the updated Leanstral lab model) when it
# writes this profile into the workdir. Reaching a Labs model requires Lab Model
# access enabled by a Mistral org admin.
display_name = "Lean (labs)"
description = "Lean agent scaffold pinned to a chosen Leanstral model (default the lab model)"
safety = "neutral"
agent_type = "agent"
system_prompt_id = "lean"
active_model = "leanstral-labs"

[[providers]]
name = "mistral-labs"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "reasoning"
backend = "generic"

[[models]]
name = "<<MODEL>>"
provider = "mistral-labs"
alias = "leanstral-labs"
temperature = 0.2
# Keep "off": vibe rejects the agent profile (silently -> "Agent not found") on
# other values, and the model still reasons server-side via api_style="reasoning".
thinking = "off"
auto_compact_threshold = 168000

[tools.bash]
default_timeout = 1200
